<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任務圈 — 工作進度追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #4CAF50;
    --green-light: #E8F5E9;
    --green-dark: #2E7D32;
    --amber: #FF9800;
    --amber-light: #FFF3E0;
    --amber-dark: #E65100;
    --blue: #2196F3;
    --blue-light: #E3F2FD;
    --teal: #009688;
    --teal-light: #E0F2F1;
    --pink: #E91E63;
    --pink-light: #FCE4EC;
    --purple: #9C27B0;
    --purple-light: #F3E5F5;
    --coral: #FF5722;
    --bg: #F7F4EE;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --text: #2C2416;
    --text2: #6B5F4E;
    --text3: #A8998A;
    --border: #E8E2D8;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* TOP HEADER */
  .app-header {
    background: linear-gradient(135deg, #2E7D32 0%, #388E3C 50%, #43A047 100%);
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 12px rgba(46,125,50,0.3);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 900px;
    margin: 0 auto;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    font-size: 28px;
    animation: sway 3s ease-in-out infinite;
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  .logo-text {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: #fff;
    letter-spacing: 0.02em;
  }

  .logo-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.75);
    font-weight: 400;
    letter-spacing: 0.05em;
  }

  .header-stats {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .stat-pill {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: #fff;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* MAIN LAYOUT */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* ADD PROJECT BTN */
  .add-project-btn {
    width: 100%;
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    color: var(--text3);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    margin-bottom: 20px;
  }

  .add-project-btn:hover {
    border-color: var(--green);
    color: var(--green-dark);
    background: var(--green-light);
  }

  /* PROJECT CARD */
  .project-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: box-shadow 0.2s;
  }

  .project-card:hover {
    box-shadow: var(--shadow-lg);
  }

  .project-header {
    padding: 18px 20px 14px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    position: relative;
  }

  .project-emoji {
    font-size: 30px;
    flex-shrink: 0;
    cursor: pointer;
  }

  .project-info {
    flex: 1;
  }

  .project-name {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 17px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .project-name input {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 17px;
    color: var(--text);
    border: none;
    background: transparent;
    outline: none;
    width: 100%;
  }

  .project-desc {
    font-size: 12px;
    color: var(--text3);
    margin-top: 3px;
  }

  .project-progress {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }

  .progress-bar {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .progress-text {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    min-width: 36px;
    text-align: right;
  }

  .project-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 30px;
    height: 30px;
    border: none;
    background: transparent;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    color: var(--text3);
  }

  .icon-btn:hover { background: var(--surface2); }
  .icon-btn.danger:hover { background: #FFEBEE; color: #C62828; }

  .collapse-arrow {
    transition: transform 0.25s;
    font-size: 12px;
  }

  .collapsed .collapse-arrow { transform: rotate(-90deg); }

  /* PHASES */
  .phases-container {
    padding: 0 16px 16px;
  }

  .phase-block {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
    overflow: hidden;
    transition: all 0.2s;
  }

  .phase-block.completed-phase {
    border-color: #A5D6A7;
    background: #F1F8E9;
  }

  .phase-block.active-phase {
    border-color: var(--amber);
    box-shadow: 0 0 0 2px rgba(255,152,0,0.15);
  }

  .phase-header {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    background: inherit;
  }

  .phase-number {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    font-family: 'Nunito', sans-serif;
  }

  .phase-number.done { background: var(--green); color: #fff; }
  .phase-number.active { background: var(--amber); color: #fff; }
  .phase-number.pending { background: var(--surface2); color: var(--text3); }

  .phase-title-wrap {
    flex: 1;
  }

  .phase-title {
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .phase-title input {
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    border: none;
    background: transparent;
    outline: none;
    font-family: 'Noto Sans TC', sans-serif;
    width: 100%;
  }

  .phase-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .phase-badge.done-badge { background: var(--green-light); color: var(--green-dark); }
  .phase-badge.active-badge { background: var(--amber-light); color: var(--amber-dark); }
  .phase-badge.pending-badge { background: var(--surface2); color: var(--text3); }

  .phase-progress-mini {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* REWARD BLOCK */
  .reward-strip {
    margin: 0 14px 12px;
    padding: 10px 14px;
    border-radius: var(--radius-xs);
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1.5px dashed;
  }

  .reward-strip.earned {
    background: linear-gradient(135deg, #FFF8E1, #FFFDE7);
    border-color: #FFD54F;
  }

  .reward-strip.locked {
    background: var(--surface2);
    border-color: var(--border);
  }

  .reward-icon { font-size: 20px; }

  .reward-content { flex: 1; }

  .reward-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }

  .reward-strip.earned .reward-label { color: #F57F17; }
  .reward-strip.locked .reward-label { color: var(--text3); }

  .reward-text {
    font-size: 13px;
    font-weight: 600;
  }

  .reward-strip.earned .reward-text { color: var(--text); }
  .reward-strip.locked .reward-text { color: var(--text2); }

  .reward-edit-btn {
    font-size: 13px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    padding: 4px;
    border-radius: 4px;
    transition: all 0.15s;
  }

  .reward-edit-btn:hover { background: rgba(0,0,0,0.06); color: var(--text); }

  .reward-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 14px 12px;
  }

  .reward-input {
    flex: 1;
    padding: 8px 12px;
    border: 1.5px solid var(--amber);
    border-radius: var(--radius-xs);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    outline: none;
    background: var(--amber-light);
  }

  .reward-save-btn {
    padding: 8px 14px;
    background: var(--amber);
    color: #fff;
    border: none;
    border-radius: var(--radius-xs);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* TASKS */
  .tasks-list {
    padding: 0 14px 8px;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--radius-xs);
    transition: background 0.15s;
    position: relative;
  }

  .task-item:hover { background: var(--surface2); }

  .task-check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
    background: var(--surface);
    font-size: 11px;
    color: transparent;
  }

  .task-check.checked {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
    animation: checkPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes checkPop {
    0% { transform: scale(0.7); }
    100% { transform: scale(1); }
  }

  .task-text {
    flex: 1;
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.4;
    transition: all 0.2s;
  }

  .task-text.done {
    text-decoration: line-through;
    color: var(--text3);
  }

  .task-text input {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    outline: none;
  }

  .task-del {
    opacity: 0;
    font-size: 12px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    padding: 2px 4px;
    border-radius: 4px;
  }

  .task-item:hover .task-del { opacity: 1; }
  .task-del:hover { background: #FFEBEE; color: #C62828; }

  .add-task-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px 4px;
    margin: 0 4px 4px;
  }

  .add-task-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    color: var(--text);
    padding: 6px 4px;
    border-bottom: 1.5px solid var(--border);
    outline: none;
    transition: border-color 0.15s;
  }

  .add-task-input:focus { border-color: var(--green); }

  .add-task-input::placeholder { color: var(--text3); }

  .add-task-btn {
    font-size: 18px;
    background: var(--green-light);
    border: none;
    color: var(--green-dark);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .add-task-btn:hover { background: var(--green); color: #fff; }

  .add-phase-btn {
    width: 100%;
    background: transparent;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
    font-size: 13px;
    color: var(--text3);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
    margin-top: 4px;
  }

  .add-phase-btn:hover { border-color: var(--amber); color: var(--amber-dark); background: var(--amber-light); }

  /* CELEBRATION OVERLAY */
  .celebration {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .reward-popup {
    background: var(--surface);
    border-radius: 20px;
    padding: 28px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: auto;
    max-width: 320px;
    width: 90%;
    border: 2px solid #FFD700;
  }

  @keyframes popIn {
    from { transform: scale(0.6) translateY(20px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .popup-emoji { font-size: 52px; margin-bottom: 12px; }
  .popup-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 20px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .popup-phase { font-size: 13px; color: var(--text2); margin-bottom: 14px; }

  .popup-reward {
    background: linear-gradient(135deg, #FFF8E1, #FFFDE7);
    border: 1.5px solid #FFD54F;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 18px;
  }

  .popup-reward-label {
    font-size: 10px;
    font-weight: 700;
    color: #F57F17;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .popup-reward-text {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .popup-close {
    padding: 10px 24px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: transform 0.15s, background 0.15s;
  }

  .popup-close:hover { background: var(--green-dark); transform: scale(1.03); }

  /* CONFETTI */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    pointer-events: none;
    z-index: 9998;
    border-radius: 2px;
  }

  /* EMOJI PICKER */
  .emoji-picker {
    position: absolute;
    top: 50px;
    left: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    box-shadow: var(--shadow-lg);
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    width: 200px;
    z-index: 200;
  }

  .emoji-option {
    font-size: 22px;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .emoji-option:hover { background: var(--surface2); }

  /* COLOR DOTS for project */
  .color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* PHASE COLOR STRIPE */
  .phase-stripe {
    width: 4px;
    border-radius: 2px;
    height: 32px;
    flex-shrink: 0;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }

  .empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; }
  .empty-state h3 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 18px; color: var(--text2); margin-bottom: 8px; }
  .empty-state p { font-size: 13px; line-height: 1.7; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 480px) {
    .header-stats { display: none; }
    .main { padding: 16px 12px 80px; }
  }
</style>
</head>
<body>

<div class="celebration" id="celebration" style="display:none;">
  <div class="reward-popup" id="rewardPopup">
    <div class="popup-emoji" id="popupEmoji">🎉</div>
    <div class="popup-title">階段完成！</div>
    <div class="popup-phase" id="popupPhase">第一階段</div>
    <div class="popup-reward">
      <div class="popup-reward-label">🏆 你的獎勵</div>
      <div class="popup-reward-text" id="popupReward">獎勵內容</div>
    </div>
    <button class="popup-close" onclick="closeReward()">✨ 繼續加油！</button>
  </div>
</div>

<div class="app-header">
  <div class="header-top">
    <div class="logo">
      <span class="logo-icon">🌱</span>
      <div>
        <div class="logo-text">任務圈</div>
        <div class="logo-sub">MISSION CIRCLE</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-pill">🗂 <span id="totalProjects">0</span> 個專案</div>
      <div class="stat-pill">✅ <span id="totalDone">0</span> 任務完成</div>
      <div class="stat-pill">🏆 <span id="totalRewards">0</span> 獎勵解鎖</div>
    </div>
  </div>
</div>

<div class="main">
  <button class="add-project-btn" onclick="addProject()">
    ＋ 新增專案
  </button>
  <div id="projectList"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🌿</div>
    <h3>還沒有任何專案</h3>
    <p>點擊上方「新增專案」<br>把你的工作拆解成皮克敏式的任務圈！</p>
  </div>
</div>

<script>
const EMOJIS = ['📋','🎯','💼','📚','🔬','🎨','💡','🚀','📊','📝','🏗','🌟','🔧','📣','🎪','🌈','⚡','🎓','🎭','🌸'];
const COLORS = ['#4CAF50','#FF9800','#2196F3','#9C27B0','#E91E63','#009688','#FF5722','#607D8B','#795548','#FFC107'];

let data = JSON.parse(localStorage.getItem('missionCircle') || '{"projects":[]}');
let activeEmojiPicker = null;

function save() {
  localStorage.setItem('missionCircle', JSON.stringify(data));
  updateStats();
}

function updateStats() {
  let totalTasks = 0, doneTasks = 0, unlockedRewards = 0;
  data.projects.forEach(p => {
    p.phases.forEach(ph => {
      ph.tasks.forEach(t => {
        totalTasks++;
        if (t.done) doneTasks++;
      });
      if (phaseComplete(ph) && ph.reward) unlockedRewards++;
    });
  });
  document.getElementById('totalProjects').textContent = data.projects.length;
  document.getElementById('totalDone').textContent = doneTasks;
  document.getElementById('totalRewards').textContent = unlockedRewards;
  document.getElementById('emptyState').style.display = data.projects.length === 0 ? 'block' : 'none';
}

function phaseComplete(ph) {
  return ph.tasks.length > 0 && ph.tasks.every(t => t.done);
}

function projectProgress(p) {
  let total = 0, done = 0;
  p.phases.forEach(ph => { ph.tasks.forEach(t => { total++; if (t.done) done++; }); });
  return total === 0 ? 0 : Math.round(done / total * 100);
}

function uid() { return Math.random().toString(36).slice(2, 9); }

function addProject() {
  const proj = {
    id: uid(),
    name: '新專案',
    emoji: EMOJIS[Math.floor(Math.random() * EMOJIS.length)],
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    collapsed: false,
    phases: [{ id: uid(), name: '第一階段', reward: '完成後給自己一杯手搖！☕', tasks: [], rewardEditing: false }]
  };
  data.projects.unshift(proj);
  save();
  render();
  // auto focus name
  setTimeout(() => {
    const el = document.querySelector(`[data-pid="${proj.id}"] .project-name-input`);
    if (el) { el.focus(); el.select(); }
  }, 80);
}

function deleteProject(pid) {
  if (!confirm('確定要刪除這個專案嗎？')) return;
  data.projects = data.projects.filter(p => p.id !== pid);
  save(); render();
}

function toggleProject(pid) {
  const p = data.projects.find(x => x.id === pid);
  if (p) { p.collapsed = !p.collapsed; save(); render(); }
}

function addPhase(pid) {
  const p = data.projects.find(x => x.id === pid);
  if (!p) return;
  const n = p.phases.length + 1;
  p.phases.push({ id: uid(), name: `第${['一','二','三','四','五','六','七','八','九','十'][n-1] || n}階段`, reward: '', tasks: [], rewardEditing: false });
  save(); render();
}

function deletePhase(pid, phid) {
  const p = data.projects.find(x => x.id === pid);
  if (!p) return;
  p.phases = p.phases.filter(ph => ph.id !== phid);
  save(); render();
}

function addTask(pid, phid, text) {
  const p = data.projects.find(x => x.id === pid);
  const ph = p && p.phases.find(x => x.id === phid);
  if (!ph || !text.trim()) return;
  ph.tasks.push({ id: uid(), text: text.trim(), done: false });
  save(); render();
}

function toggleTask(pid, phid, tid) {
  const p = data.projects.find(x => x.id === pid);
  const ph = p && p.phases.find(x => x.id === phid);
  const t = ph && ph.tasks.find(x => x.id === tid);
  if (!t) return;
  t.done = !t.done;
  save();

  // check if phase just completed
  if (t.done && phaseComplete(ph)) {
    setTimeout(() => showReward(p, ph), 300);
  } else {
    render();
  }
}

function deleteTask(pid, phid, tid) {
  const p = data.projects.find(x => x.id === pid);
  const ph = p && p.phases.find(x => x.id === phid);
  if (!ph) return;
  ph.tasks = ph.tasks.filter(t => t.id !== tid);
  save(); render();
}

function showReward(proj, phase) {
  launchConfetti();
  document.getElementById('popupEmoji').textContent = proj.emoji;
  document.getElementById('popupPhase').textContent = `《${proj.name}》 ${phase.name}`;
  document.getElementById('popupReward').textContent = phase.reward || '🎊 太棒了！繼續保持！';
  document.getElementById('celebration').style.display = 'flex';
  render();
}

function closeReward() {
  document.getElementById('celebration').style.display = 'none';
}

function launchConfetti() {
  const colors = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: -10px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      transform: rotate(${Math.random() * 360}deg);
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
    `;
    document.body.appendChild(el);
    const dur = 1500 + Math.random() * 1500;
    const x = (Math.random() - 0.5) * 200;
    el.animate([
      { transform: `translateX(0) translateY(0) rotate(0deg)`, opacity: 1 },
      { transform: `translateX(${x}px) translateY(${window.innerHeight + 20}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
    ], { duration: dur, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' }).onfinish = () => el.remove();
  }
}

function getPhaseStatus(ph, phases, idx) {
  if (phaseComplete(ph)) return 'done';
  for (let i = 0; i < idx; i++) { if (!phaseComplete(phases[i])) return 'pending'; }
  return 'active';
}

function render() {
  const list = document.getElementById('projectList');
  list.innerHTML = data.projects.map(p => renderProject(p)).join('');
  attachEvents();
  updateStats();
}

function renderProject(p) {
  const prog = projectProgress(p);
  const progColor = prog === 100 ? '#4CAF50' : prog > 50 ? '#FF9800' : '#2196F3';
  return `
  <div class="project-card" data-pid="${p.id}" ${p.collapsed ? 'class="project-card collapsed"' : ''}>
    <div class="project-header" data-toggle="${p.id}">
      <span class="project-emoji" data-emoji-trigger="${p.id}">${p.emoji}</span>
      <div class="project-info">
        <div class="project-name">
          <input class="project-name-input" value="${escHtml(p.name)}" placeholder="專案名稱"
            data-field="name" data-pid="${p.id}" onclick="event.stopPropagation()">
        </div>
        <div class="project-progress">
          <div class="progress-bar">
            <div class="progress-fill" style="width:${prog}%;background:${progColor}"></div>
          </div>
          <span class="progress-text" style="color:${progColor}">${prog}%</span>
        </div>
      </div>
      <div class="project-controls" onclick="event.stopPropagation()">
        <button class="icon-btn" title="新增階段" data-add-phase="${p.id}">＋</button>
        <button class="icon-btn danger" title="刪除專案" data-del-project="${p.id}">🗑</button>
        <span class="collapse-arrow" style="color:var(--text3);${p.collapsed ? 'transform:rotate(-90deg)' : ''}">▼</span>
      </div>
    </div>
    ${!p.collapsed ? `<div class="phases-container">${p.phases.map((ph, idx) => renderPhase(p, ph, idx)).join('')}
    <button class="add-phase-btn" data-add-phase="${p.id}">＋ 新增階段</button>
    </div>` : ''}
  </div>`;
}

function renderPhase(p, ph, idx) {
  const status = getPhaseStatus(ph, p.phases, idx);
  const total = ph.tasks.length;
  const done = ph.tasks.filter(t => t.done).length;
  const numClass = { done: 'done', active: 'active', pending: 'pending' }[status];
  const badgeClass = { done: 'done-badge', active: 'active-badge', pending: 'pending-badge' }[status];
  const badgeText = { done: '✓ 完成', active: '進行中', pending: '待解鎖' }[status];
  const blockClass = { done: 'completed-phase', active: 'active-phase', pending: '' }[status];
  const earned = status === 'done';

  return `
  <div class="phase-block ${blockClass}">
    <div class="phase-header">
      <div class="phase-number ${numClass}">${status === 'done' ? '✓' : idx + 1}</div>
      <div class="phase-title-wrap">
        <div class="phase-title">
          <input value="${escHtml(ph.name)}" placeholder="階段名稱"
            data-field="phasename" data-pid="${p.id}" data-phid="${ph.id}"
            onclick="event.stopPropagation()">
        </div>
        <div class="phase-progress-mini">${total === 0 ? '尚無任務' : `${done} / ${total} 項完成`}</div>
      </div>
      <span class="phase-badge ${badgeClass}">${badgeText}</span>
      ${p.phases.length > 1 ? `<button class="icon-btn danger" style="margin-left:4px" data-del-phase="${p.id}|${ph.id}">✕</button>` : ''}
    </div>

    ${ph.rewardEditing ? `
    <div class="reward-input-wrap">
      <input class="reward-input" id="ri_${ph.id}" value="${escHtml(ph.reward)}" placeholder="完成這階段的獎勵是...">
      <button class="reward-save-btn" data-save-reward="${p.id}|${ph.id}">儲存</button>
    </div>` : `
    <div class="reward-strip ${earned ? 'earned' : 'locked'}">
      <span class="reward-icon">${earned ? '🏆' : '🔒'}</span>
      <div class="reward-content">
        <div class="reward-label">${earned ? '已解鎖獎勵' : '完成階段後解鎖'}</div>
        <div class="reward-text">${ph.reward || '點擊鉛筆設定你的獎勵...'}</div>
      </div>
      <button class="reward-edit-btn" data-edit-reward="${p.id}|${ph.id}">✏️</button>
    </div>`}

    <div class="tasks-list">
      ${ph.tasks.map(t => `
      <div class="task-item">
        <div class="task-check ${t.done ? 'checked' : ''}" data-toggle-task="${p.id}|${ph.id}|${t.id}">${t.done ? '✓' : ''}</div>
        <span class="task-text ${t.done ? 'done' : ''}">${escHtml(t.text)}</span>
        <button class="task-del" data-del-task="${p.id}|${ph.id}|${t.id}">✕</button>
      </div>`).join('')}
    </div>
    <div class="add-task-row">
      <input class="add-task-input" placeholder="新增任務..." data-new-task="${p.id}|${ph.id}">
      <button class="add-task-btn" data-submit-task="${p.id}|${ph.id}">＋</button>
    </div>
  </div>`;
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function attachEvents() {
  // Toggle project
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('[data-field]') || e.target.closest('[data-del-project]') || e.target.closest('[data-add-phase]') || e.target.closest('[data-emoji-trigger]')) return;
      toggleProject(el.dataset.toggle);
    });
  });

  // Emoji picker
  document.querySelectorAll('[data-emoji-trigger]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      closeEmojiPicker();
      const pid = el.dataset.emojiTrigger;
      const picker = document.createElement('div');
      picker.className = 'emoji-picker';
      picker.innerHTML = EMOJIS.map(em => `<div class="emoji-option" data-em="${em}">${em}</div>`).join('');
      picker.querySelectorAll('.emoji-option').forEach(o => {
        o.addEventListener('click', () => {
          const p = data.projects.find(x => x.id === pid);
          if (p) { p.emoji = o.dataset.em; save(); render(); }
          closeEmojiPicker();
        });
      });
      el.closest('.project-header').style.position = 'relative';
      el.closest('.project-header').appendChild(picker);
      activeEmojiPicker = picker;
      setTimeout(() => document.addEventListener('click', closeEmojiPicker, { once: true }), 50);
    });
  });

  // Field inputs
  document.querySelectorAll('[data-field="name"]').forEach(el => {
    el.addEventListener('input', () => {
      const p = data.projects.find(x => x.id === el.dataset.pid);
      if (p) { p.name = el.value; save(); updateStats(); }
    });
  });

  document.querySelectorAll('[data-field="phasename"]').forEach(el => {
    el.addEventListener('input', () => {
      const p = data.projects.find(x => x.id === el.dataset.pid);
      const ph = p && p.phases.find(x => x.id === el.dataset.phid);
      if (ph) { ph.name = el.value; save(); }
    });
  });

  // Add phase
  document.querySelectorAll('[data-add-phase]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); addPhase(el.dataset.addPhase); });
  });

  // Del project
  document.querySelectorAll('[data-del-project]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); deleteProject(el.dataset.delProject); });
  });

  // Del phase
  document.querySelectorAll('[data-del-phase]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const [pid, phid] = el.dataset.delPhase.split('|');
      deletePhase(pid, phid);
    });
  });

  // Toggle task
  document.querySelectorAll('[data-toggle-task]').forEach(el => {
    el.addEventListener('click', () => {
      const [pid, phid, tid] = el.dataset.toggleTask.split('|');
      toggleTask(pid, phid, tid);
    });
  });

  // Del task
  document.querySelectorAll('[data-del-task]').forEach(el => {
    el.addEventListener('click', () => {
      const [pid, phid, tid] = el.dataset.delTask.split('|');
      deleteTask(pid, phid, tid);
    });
  });

  // Add task input + button
  document.querySelectorAll('[data-new-task]').forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const [pid, phid] = el.dataset.newTask.split('|');
        addTask(pid, phid, el.value);
        el.value = '';
      }
    });
  });

  document.querySelectorAll('[data-submit-task]').forEach(el => {
    el.addEventListener('click', () => {
      const [pid, phid] = el.dataset.submitTask.split('|');
      const input = document.querySelector(`[data-new-task="${pid}|${phid}"]`);
      if (input) { addTask(pid, phid, input.value); input.value = ''; input.focus(); }
    });
  });

  // Reward edit
  document.querySelectorAll('[data-edit-reward]').forEach(el => {
    el.addEventListener('click', () => {
      const [pid, phid] = el.dataset.editReward.split('|');
      const p = data.projects.find(x => x.id === pid);
      const ph = p && p.phases.find(x => x.id === phid);
      if (ph) { ph.rewardEditing = true; save(); render(); setTimeout(() => { const inp = document.getElementById('ri_' + phid); if (inp) { inp.focus(); inp.select(); } }, 60); }
    });
  });

  document.querySelectorAll('[data-save-reward]').forEach(el => {
    el.addEventListener('click', () => {
      const [pid, phid] = el.dataset.saveReward.split('|');
      const p = data.projects.find(x => x.id === pid);
      const ph = p && p.phases.find(x => x.id === phid);
      if (ph) {
        const inp = document.getElementById('ri_' + phid);
        if (inp) ph.reward = inp.value;
        ph.rewardEditing = false;
        save(); render();
      }
    });
  });
}

function closeEmojiPicker() {
  if (activeEmojiPicker) { activeEmojiPicker.remove(); activeEmojiPicker = null; }
}

// Init with sample data if empty
if (data.projects.length === 0) {
  data.projects = [{
    id: uid(), name: '品格教育課程設計', emoji: '📚', color: '#4CAF50', collapsed: false,
    phases: [
      { id: uid(), name: '第一階段：資料蒐集', reward: '☕ 去喝一杯想喝很久的咖啡！', tasks: [
        { id: uid(), text: '整理各年級品格指標文獻', done: true },
        { id: uid(), text: '分析頭心手框架應用案例', done: true },
        { id: uid(), text: '訪談三位資深老師', done: true },
      ], rewardEditing: false },
      { id: uid(), name: '第二階段：課程設計', reward: '🎬 週末看一部想看的電影！', tasks: [
        { id: uid(), text: '撰寫三年級誠實主題教案', done: false },
        { id: uid(), text: '設計可觀察行為指標', done: false },
        { id: uid(), text: '完成學習目標對照表', done: false },
      ], rewardEditing: false },
      { id: uid(), name: '第三階段：試教與修訂', reward: '🛍 買一個一直想要的文具！', tasks: [
        { id: uid(), text: '安排試教學校', done: false },
        { id: uid(), text: '蒐集教師回饋', done: false },
        { id: uid(), text: '修訂課程內容', done: false },
      ], rewardEditing: false },
    ]
  }];
  save();
}

render();
</script>
